# @package _global_

defaults:
  - /dataset@_group_.re10k: re10k
  - override /model/encoder: nas3r
  - override /model/encoder/backbone: masked_vggt
  - override /model/decoder: splatting_cuda
  - override /loss: [mse, lpips]

wandb:
  name: re10k
  tags: [re10k, 224x224]
  project: nas3r



model:
  encoder:
    backbone:
      intrinsics_embed_loc: 'decoder'
      pretrained: true

      depth_activation: 'sigmoid'
      num_iterations: 1
      init_intrinsics: true
      init_poses: false

    estimating_focal: false 



dataset:
  re10k:
    input_image_shape: [224, 224]
    make_baseline_1: true
    view_sampler:
      warm_up_steps: 200_000
      num_target_views: 1
      num_context_views: 2
      # initial_min_distance_between_context_views: 10 
      # min_distance_between_context_views: 25 
      # initial_max_distance_between_context_views: 10 
      # max_distance_between_context_views: 90 
      max_distance_between_context_views: 150


optimizer:
  lr: 1e-4
  warm_up_steps: 2000
  backbone_lr_multiplier: 0.1
  min_lr_multiplier: 0.01

data_loader:
  train:
    batch_size: 10

trainer:
  max_steps: 400_001
  val_check_interval: 10000

checkpointing:
  every_n_train_steps: 10000
  save_weights_only: false
  save_top_k: 1


train:
  training_context: false
  pretrain_camera_head: true

test:
  output_path: outputs/test/nas3r/pretrained
  align_pose: false
  compute_scores: true
  save_image: true
  save_video: false
  save_compare: false